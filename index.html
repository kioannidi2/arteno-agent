<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTENO — Digital Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:210px;min-width:210px;background:#fff;border-right:1px solid #e8e8e6;display:flex;flex-direction:column}
.logo{padding:1rem;border-bottom:1px solid #e8e8e6}
.logo-t{font-size:15px;font-weight:700;letter-spacing:.12em}
.logo-s{font-size:10px;color:#999;margin-top:2px}
.nav{padding:.5rem 0;flex:1}
.ni{display:flex;align-items:center;gap:9px;padding:9px 1rem;font-size:13px;color:#666;cursor:pointer}
.ni:hover,.ni.active{background:#f5f5f3;color:#1a1a1a;font-weight:500}
.nic{font-size:13px;width:15px;text-align:center}
.bdg{margin-left:auto;font-size:10px;font-weight:600;background:#e8f0fe;color:#1a56db;padding:1px 5px;border-radius:8px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e8e8e6;padding:.65rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.topbar-t{font-size:14px;font-weight:500}
.tbacts{display:flex;gap:6px}
.btn{font-size:12px;padding:5px 11px;border:1px solid #ddd;border-radius:8px;background:transparent;color:#1a1a1a;cursor:pointer;font-family:inherit}
.btn:hover{background:#f5f5f3}
.btn-p{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.content{flex:1;overflow-y:auto;padding:1.25rem}
.sec{display:none}.sec.active{display:block}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.sc{background:#f5f5f3;border-radius:8px;padding:.7rem}
.sv{font-size:20px;font-weight:600}
.sl{font-size:10px;color:#999;margin-top:2px}
.sbar{width:100%;font-size:13px;font-family:inherit;padding:7px 11px;border-radius:8px;border:1px solid #ddd;background:#fff;outline:none;margin-bottom:.6rem}
.fps{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.8rem}
.fp{font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;border:1px solid #e8e8e6;background:transparent;color:#666;font-family:inherit}
.fp.on,.fp:hover{background:#f5f5f3;color:#1a1a1a;font-weight:500;border-color:#ccc}
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.ocard{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:.85rem}
.ocard:hover{border-color:#bbb}
.otop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.oname{font-size:13px;font-weight:500;line-height:1.3}
.osub{font-size:10px;color:#bbb;margin-top:1px}
.sp{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-left:6px}
.s-contacted{background:#e6f4ea;color:#1e7e34}
.s-send_sample{background:#e3f3fd;color:#0d6b9e}
.s-appointment{background:#fff8e1;color:#e65100}
.s-not_interested{background:#fce8e6;color:#c5221f}
.s-to_contact{background:#f5f5f3;color:#888}
.ometa{font-size:10px;color:#aaa;margin-top:3px}
.onotes{font-size:11px;color:#666;margin-top:6px;border-top:1px solid #f0f0ee;padding-top:5px;line-height:1.5}
.oacts{display:flex;gap:5px;margin-top:7px}
.cwrap{display:flex;flex-direction:column;height:calc(100vh - 108px)}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:.75rem}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.u{flex-direction:row-reverse}
.av{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.av.ai{background:#e8f0fe;color:#1a56db}
.av.u{background:#f0f0ee;color:#666}
.bub{max-width:82%;font-size:13px;line-height:1.6;padding:9px 13px;border-radius:12px;background:#f5f5f3;border:1px solid #e8e8e6}
.msg.u .bub{background:#fff}
.bub.ld{color:#aaa;font-style:italic}
.irow{display:flex;gap:6px;align-items:flex-end;background:#fff;border:1px solid #ddd;border-radius:12px;padding:9px 11px;margin-top:8px}
.ci{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;color:#1a1a1a;resize:none;outline:none;max-height:100px;line-height:1.5}
.sb{width:29px;height:29px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center}
.mover.open{display:flex}
.modal{background:#fff;border:1px solid #ddd;border-radius:14px;padding:1.35rem;width:420px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mt{font-size:14px;font-weight:600;margin-bottom:.8rem}
.fl{margin-bottom:9px}
.fl label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.fl input,.fl select,.fl textarea{width:100%;font-size:13px;font-family:inherit;padding:6px 9px;border-radius:8px;border:1px solid #ddd;background:#f9f9f8;color:#1a1a1a;outline:none}
.fl textarea{resize:vertical;min-height:65px}
.macts{display:flex;justify-content:flex-end;gap:7px;margin-top:.9rem}
.capt{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:.85rem;margin-bottom:8px}
.bcard{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:.85rem;margin-bottom:8px}
.empty{text-align:center;padding:2.5rem 1rem;color:#ccc;font-size:13px}
#cal-status{font-size:12px;min-height:18px;margin-top:7px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo"><div class="logo-t">ARTENO</div><div class="logo-s">Digital Assistant</div></div>
    <nav class="nav">
      <div class="ni active" onclick="showSec('chat',this)"><span class="nic">✦</span>AI Βοηθός</div>
      <div class="ni" onclick="showSec('offices',this)"><span class="nic">◎</span>Γραφεία<span class="bdg" id="cnt">0</span></div>
      <div class="ni" onclick="showSec('calendar',this)"><span class="nic">◈</span>Ραντεβού</div>
      <div class="ni" onclick="showSec('briefing',this)"><span class="nic">◆</span>Briefing</div>
    </nav>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-t" id="sectl">AI Βοηθός</div>
      <div class="tbacts" id="tbacts"><button class="btn" onclick="clearChat()">Νέα συνομιλία</button></div>
    </div>
    <div class="content">
      <div class="sec active" id="sec-chat">
        <div class="cwrap">
          <div class="msgs" id="msgs">
            <div class="msg"><div class="av ai">A</div>
              <div class="bub">Γεια! Είμαι ο βοηθός της <strong>ARTENO</strong>.<br><br>Έχω <strong>271 γραφεία</strong> φορτωμένα.<br><br>Μπορώ να βρω ιστορικό, να δώσω briefing, να κλείσω ραντεβού στο Calendar.<br><br>Τι κάνουμε;</div>
            </div>
          </div>
          <div><div class="irow">
            <textarea class="ci" id="ci" rows="1" placeholder="π.χ. 'briefing για lab athens' ή 'κλείσε ραντεβού με aspect architects'" onkeydown="hkey(event)" oninput="ar(this)"></textarea>
            <button class="sb" onclick="send()">→</button>
          </div></div>
        </div>
      </div>
      <div class="sec" id="sec-offices">
        <div class="stats" id="stats"></div>
        <input class="sbar" id="osearch" placeholder="Αναζήτηση γραφείου, email, σημειώσεις..." oninput="renderOffices(this.value,curF)">
        <div class="fps" id="fpills"></div>
        <div class="ogrid" id="ogrid"></div>
      </div>
      <div class="sec" id="sec-calendar">
        <div style="margin-bottom:1rem"><button class="btn btn-p" onclick="openCalMod()">+ Νέο Ραντεβού στο Google Calendar</button></div>
        <div id="callist"></div>
      </div>
      <div class="sec" id="sec-briefing">
        <input class="sbar" id="bsearch" placeholder="Αναζήτηση γραφείου για briefing..." oninput="renderBriefing(this.value)">
        <div id="blist"></div>
      </div>
    </div>
  </div>
</div>

<div class="mover" id="omod">
  <div class="modal">
    <div class="mt">Επεξεργασία Γραφείου</div>
    <div class="fl"><label>Όνομα</label><input id="em-name"></div>
    <div class="fl"><label>Email</label><input id="em-email"></div>
    <div class="fl"><label>Τηλέφωνο</label><input id="em-phone"></div>
    <div class="fl"><label>Διεύθυνση</label><input id="em-addr"></div>
    <div class="fl"><label>Κατάσταση</label>
      <select id="em-status">
        <option value="to_contact">Για επανεπικοινωνία</option>
        <option value="contacted">Επικοινωνήσαμε</option>
        <option value="send_sample">Να σταλεί δείγμα</option>
        <option value="appointment">Ραντεβού κλεισμένο</option>
        <option value="not_interested">Δεν ενδιαφέρεται</option>
      </select>
    </div>
    <div class="fl"><label>Σημειώσεις</label><textarea id="em-notes" rows="4"></textarea></div>
    <div class="macts">
      <button class="btn" onclick="closeMod('omod')">Ακύρωση</button>
      <button class="btn btn-p" onclick="saveEdit()">Αποθήκευση</button>
    </div>
  </div>
</div>

<div class="mover" id="calmod">
  <div class="modal">
    <div class="mt">Ραντεβού — Google Calendar</div>
    <div class="fl"><label>Τίτλος *</label><input id="cal-title" placeholder="π.χ. Ραντεβού aspect architects"></div>
    <div class="fl"><label>Ημερομηνία</label><input id="cal-date" type="date"></div>
    <div class="fl"><label>Ώρα</label><input id="cal-time" type="time" value="10:00"></div>
    <div class="fl"><label>Διάρκεια (λεπτά)</label><input id="cal-dur" type="number" value="60" min="15" step="15"></div>
    <div class="fl"><label>Τοποθεσία</label><input id="cal-loc"></div>
    <div class="fl"><label>Σημειώσεις</label><textarea id="cal-notes" rows="3"></textarea></div>
    <div id="cal-status"></div>
    <div class="macts">
      <button class="btn" onclick="closeMod('calmod')">Ακύρωση</button>
      <button class="btn btn-p" id="cal-save-btn" onclick="saveToCalendar()">Αποθήκευση</button>
    </div>
  </div>
</div>

var offices = [], appointments = [], chatHist = [], editId = null, curF = "all";

function loadData() {
  try {
    var s = localStorage.getItem("arteno_v4");
    if (s) {
      var d = JSON.parse(s);
      offices = d.offices && d.offices.length > 0 ? d.offices : BASE_OFFICES.slice();
      appointments = d.appointments || [];
    } else {
      offices = BASE_OFFICES.slice();
    }
  } catch(e) {
    offices = BASE_OFFICES.slice();
  }
  var clean = offices.filter(function(o){ return o.name && o.name.trim(); });
  document.getElementById("cnt").textContent = clean.length;
}

function saveData() {
  try { localStorage.setItem("arteno_v4", JSON.stringify({offices:offices, appointments:appointments})); } catch(e) {}
}

function showSec(name, el) {
  document.querySelectorAll(".sec").forEach(function(s){ s.classList.remove("active"); });
  document.querySelectorAll(".ni").forEach(function(n){ n.classList.remove("active"); });
  document.getElementById("sec-"+name).classList.add("active");
  el.classList.add("active");
  var clean = offices.filter(function(o){ return o.name && o.name.trim(); });
  var T = {chat:"AI Βοηθός", offices:"Γραφεία ("+clean.length+")", calendar:"Google Calendar", briefing:"Briefing"};
  document.getElementById("sectl").textContent = T[name] || name;
  var acts = document.getElementById("tbacts");
  if (name === "chat") acts.innerHTML = '<button class="btn" onclick="clearChat()">Νέα συνομιλία</button>';
  else if (name === "offices") acts.innerHTML = '<button class="btn btn-p" onclick="openOfficeMod(null)">+ Προσθήκη</button>';
  else if (name === "calendar") acts.innerHTML = '<button class="btn btn-p" onclick="openCalMod()">+ Ραντεβού</button>';
  else acts.innerHTML = "";
  if (name === "offices") { renderStats(); renderFilters(); renderOffices("", curF); }
  if (name === "calendar") renderCal();
  if (name === "briefing") renderBriefing("");
}

    return o.name && o.name.trim() &&
      o.name.indexOf("ΔΕΝ") !== 0 &&
      o.name.indexOf("Επαφ") !== 0 &&
      o.name.indexOf("φουρνιά") === -1 &&
      o.name.indexOf("TOP") !== 0;
  });
}

function renderStats() {
  var list = cleanList();
  var c = {total:list.length, appointment:0, send_sample:0, contacted:0, not_interested:0, to_contact:0};
  list.forEach(function(o) { if (c[o.status] !== undefined) c[o.status]++; });
  document.getElementById("stats").innerHTML =
    '<div class="sc"><div class="sv">'+c.total+'</div><div class="sl">Σύνολο</div></div>'+
    '<div class="sc"><div class="sv">'+c.appointment+'</div><div class="sl">Ραντεβού</div></div>'+
    '<div class="sc"><div class="sv">'+c.send_sample+'</div><div class="sl">Δείγμα</div></div>'+
    '<div class="sc"><div class="sv">'+c.contacted+'</div><div class="sl">Επαφή</div></div>'+
    '<div class="sc"><div class="sv">'+c.not_interested+'</div><div class="sl">Αδιάφοροι</div></div>';
}

function renderFilters() {
  document.getElementById("fpills").innerHTML = FILTERS.map(function(f) {
    return '<button class="fp'+(curF===f.k?" on":"")+'" onclick="setF(''+f.k+'')">'+f.l+'</button>';
  }).join("");
}

function setF(k) { curF = k; renderFilters(); renderOffices(document.getElementById("osearch").value, k); }

function renderOffices(q, filter) {
  q = q || ""; filter = filter || "all";
  var list = cleanList();
  if (filter !== "all") list = list.filter(function(o) { return o.status === filter; });
  if (q) {
    var ql = q.toLowerCase();
    list = list.filter(function(o) {
      return ((o.name||"")+(o.email||"")+(o.notes||"")+(o.address||"")).toLowerCase().indexOf(ql) !== -1;
    });
  }
  var g = document.getElementById("ogrid");
  if (!list.length) { g.innerHTML = '<div class="empty">Δεν βρέθηκαν γραφεία.</div>'; return; }
  g.innerHTML = list.map(function(o) {
    var email = o.email && o.email.indexOf("@") !== -1 && o.email.indexOf(" ") === -1 ? '<div class="ometa">✉ '+o.email+'</div>' : "";
    var phone = o.phone && String(o.phone).length > 4 ? '<div class="ometa">✆ '+String(o.phone).slice(0,30)+'</div>' : "";
    var notes = o.notes ? '<div class="onotes">'+o.notes.slice(0,110)+(o.notes.length>110?"...":"")+'</div>' : "";
    return '<div class="ocard"><div class="otop"><div><div class="oname">'+o.name+'</div><div class="osub">'+(o.sheet||"")+'</div></div><span class="sp s-'+o.status+'">'+(SL[o.status]||o.status)+'</span></div>'+email+phone+notes+'<div class="oacts"><button class="btn" style="font-size:11px;padding:3px 8px" onclick="editOffice('+o.id+')">Επεξεργασία</button><button class="btn" style="font-size:11px;padding:3px 8px" onclick="briefFor('+o.id+')">Briefing ↗</button><button class="btn btn-p" style="font-size:11px;padding:3px 8px;margin-left:auto" onclick="calFor('+o.id+')">+ Cal</button></div></div>';
  }).join("");
}

function openOfficeMod(id) {
  editId = id;
  if (id) {
    var o = offices.filter(function(x){ return x.id===id; })[0];
    if (o) {
      document.getElementById("em-name").value = o.name||"";
      document.getElementById("em-email").value = o.email||"";
      document.getElementById("em-phone").value = o.phone||"";
      document.getElementById("em-addr").value = o.address||"";
      document.getElementById("em-status").value = o.status||"to_contact";
      document.getElementById("em-notes").value = o.notes||"";
    }
  } else {
    ["em-name","em-email","em-phone","em-addr","em-notes"].forEach(function(i){ document.getElementById(i).value=""; });
    document.getElementById("em-status").value = "to_contact";
  }
  document.getElementById("omod").classList.add("open");
}
function editOffice(id) { openOfficeMod(id); }

function saveEdit() {
  var name = document.getElementById("em-name").value.trim();
  if (!name) { alert("Βάλε όνομα!"); return; }
  var data = {
    id: editId || Date.now(),
    name: name,
    email: document.getElementById("em-email").value.trim(),
    phone: document.getElementById("em-phone").value.trim(),
    address: document.getElementById("em-addr").value.trim(),
    status: document.getElementById("em-status").value,
    notes: document.getElementById("em-notes").value.trim(),
    sheet: "Manual"
  };
  data.sl = SL[data.status] || data.status;
  if (editId) {
    var idx = offices.findIndex(function(o){ return o.id===editId; });
    if (idx !== -1) offices[idx] = data;
  } else { offices.push(data); }
  saveData(); closeMod("omod");
  renderStats(); renderFilters(); renderOffices(document.getElementById("osearch").value, curF);
}

function closeMod(id) { document.getElementById(id).classList.remove("open"); }

function openCalMod(title, loc, notes) {
  document.getElementById("cal-title").value = title||"";
  document.getElementById("cal-loc").value = loc||"";
  document.getElementById("cal-notes").value = notes||"";
  document.getElementById("cal-date").value = "";
  document.getElementById("cal-status").textContent = "";
  document.getElementById("calmod").classList.add("open");
}
function calFor(id) {
  var o = offices.filter(function(x){ return x.id===id; })[0];
  if (!o) return;
  openCalMod("Ραντεβού ARTENO — "+o.name, o.address||"", o.notes ? o.notes.slice(0,200) : "");
}

async function saveToCalendar() {
  var title = document.getElementById("cal-title").value.trim();
  var date = document.getElementById("cal-date").value;
  var time = document.getElementById("cal-time").value || "10:00";
  var dur = parseInt(document.getElementById("cal-dur").value) || 60;
  var loc = document.getElementById("cal-loc").value.trim();
  var notes = document.getElementById("cal-notes").value.trim();
  if (!title || !date) { document.getElementById("cal-status").textContent = "Βάλε τίτλο και ημερομηνία!"; return; }
  var btn = document.getElementById("cal-save-btn");
  btn.textContent = "Αποθηκεύω..."; btn.disabled = true;
  try {
    var start = new Date(date+"T"+time+":00");
    var end = new Date(start.getTime()+dur*60000);
    var r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-beta":"mcp-client-2025-04-04"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
        system:"Use the Google Calendar MCP tool to create calendar events.",
        messages:[{role:"user",content:"Create event: "+title+" on "+start.toISOString()+" to "+end.toISOString()+" at "+loc+". Description: "+notes}],
        mcp_servers:[{type:"url",url:"https://gcal.mcp.claude.com/mcp",name:"gcal"}]})
    });
    var d = await r.json();
    var txt = (d.content||[]).map(function(b){return b.type==="text"?b.text:"";}).join(" ");
    var appt = {id:Date.now(),title:title,date:date,time:time,loc:loc,notes:notes};
    appointments.push(appt); saveData();
    var st = document.getElementById("cal-status");
    if (txt.toLowerCase().indexOf("creat") !== -1 || txt.toLowerCase().indexOf("event") !== -1) {
      st.style.color="#1e7e34"; st.textContent="✓ Αποθηκεύτηκε στο Google Calendar!";
    } else {
      st.style.color="#666"; st.textContent="Αποθηκεύτηκε τοπικά.";
    }
    setTimeout(function(){closeMod("calmod");renderCal();}, 1500);
  } catch(e) {
    document.getElementById("cal-status").style.color="#c5221f";
    document.getElementById("cal-status").textContent="Σφάλμα: "+e.message;
  }
  btn.textContent="Αποθήκευση"; btn.disabled=false;
}

function renderCal() {
  var el = document.getElementById("callist");
  if (!appointments.length) { el.innerHTML='<div class="empty">Δεν υπάρχουν ραντεβού ακόμα.</div>'; return; }
  el.innerHTML = appointments.sort(function(a,b){return new Date(a.date+" "+a.time)-new Date(b.date+" "+b.time);}).map(function(a) {
    return '<div class="capt"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="font-size:13px;font-weight:500">'+a.title+'</div><span style="font-size:11px;font-weight:600;background:#fff8e1;color:#e65100;padding:2px 8px;border-radius:8px">'+a.date+' '+a.time+'</span></div>'+(a.loc?'<div class="ometa" style="margin-top:4px">◎ '+a.loc+'</div>':'')+'<div style="margin-top:7px"><button class="btn" style="font-size:11px;padding:3px 8px;color:#c5221f" onclick="delAppt('+a.id+')">Διαγραφή</button></div></div>';
  }).join("");
}
function delAppt(id) { appointments = appointments.filter(function(a){return a.id!==id;}); saveData(); renderCal(); }

function renderBriefing(q) {
  var list = cleanList().filter(function(o){ return o.notes && (o.status==="appointment"||o.status==="contacted"); });
  if (q) { var ql=q.toLowerCase(); list=list.filter(function(o){return (o.name||"").toLowerCase().indexOf(ql)!==-1;}); }
  var el = document.getElementById("blist");
  if (!list.length) { el.innerHTML='<div class="empty">Δεν βρέθηκαν γραφεία με ιστορικό.</div>'; return; }
  el.innerHTML = list.map(function(o) {
    return '<div class="bcard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:500">'+o.name+'</span><span class="sp s-'+o.status+'">'+(SL[o.status]||o.status)+'</span></div><button class="btn btn-p" style="font-size:11px;padding:3px 9px" onclick="briefFor('+o.id+')">AI Briefing ↗</button></div><div style="font-size:12px;color:#666;line-height:1.6">'+(o.notes||"").slice(0,200)+'</div></div>';
  }).join("");
}

function briefFor(id) {
  var o = offices.filter(function(x){return x.id===id;})[0]; if(!o) return;
  showSec("chat", document.querySelector(".ni"));
  document.querySelectorAll(".ni").forEach(function(n){n.classList.remove("active");});
  document.querySelector(".ni").classList.add("active");
  document.getElementById("ci").value = 'Δώσε μου briefing για ραντεβού με "'+o.name+'". Κατάσταση: '+(o.sl||o.status)+'. Ιστορικό: '+(o.notes||"δεν υπάρχει")+'. Τηλ: '+(o.phone||"-")+'. Τι να πω, τι να αποφύγω, επόμενο βήμα;';
  send();
}

var SYS = "Είσαι ο ψηφιακός βοηθός της ARTENO, εταιρείας αντιπροσωπειών αρχιτεκτονικών υλικών. Το κύριο προϊόν είναι ένα νέου τύπου υαλότουβλο — premium, σύγχρονο. Βοήθα τον χρήστη να διαχειριστεί γραφεία, να παίρνει briefing, να κλείνει ραντεβού. Απάντα στα ελληνικά.";

async function callClaude(msg) {
  var ctx = offices.filter(function(o){return o.notes||o.status==="appointment";}).slice(0,25).map(function(o){return o.name+"|"+(o.sl||o.status)+"|"+(o.notes||"").slice(0,80);}).join("\n");
  chatHist.push({role:"user",content:msg});
  try {
    var r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:SYS+(ctx?"\nΓραφεία:\n"+ctx:""),messages:chatHist})
    });
    var d = await r.json();
    var rep = (d.content||[]).filter(function(b){return b.type==="text";})[0];
    rep = rep ? rep.text : "Σφάλμα σύνδεσης.";
    chatHist.push({role:"assistant",content:rep});
    return rep;
  } catch(e) { return "Σφάλμα: "+e.message; }
}

function addMsg(txt, isU) {
  var m = document.getElementById("msgs");
  var d = document.createElement("div"); d.className = "msg"+(isU?" u":"");
  d.innerHTML = '<div class="av '+(isU?"u":"ai")+'">'+(isU?"Ε":"A")+'</div><div class="bub">'+txt.replace(/\n/g,"<br>").replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")+'</div>';
  m.appendChild(d); m.scrollTop=99999;
}

async function send() {
  var ci=document.getElementById("ci"); var t=ci.value.trim(); if(!t) return;
  ci.value=""; ci.style.height="auto"; addMsg(t,true);
  var ld=document.createElement("div"); ld.className="msg";
  ld.innerHTML='<div class="av ai">A</div><div class="bub ld">Σκέφτομαι...</div>';
  document.getElementById("msgs").appendChild(ld); document.getElementById("msgs").scrollTop=99999;
  var rep=await callClaude(t); ld.remove(); addMsg(rep,false);
  if((t.indexOf("ραντεβού")!==-1||t.indexOf("calendar")!==-1)&&(t.indexOf("κλείσε")!==-1||t.indexOf("βάλε")!==-1)){openCalMod();}
}
function hkey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}
function ar(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,100)+"px";}
function clearChat(){
  chatHist=[];
  document.getElementById("msgs").innerHTML='<div class="msg"><div class="av ai">A</div><div class="bub">Νέα συνομιλία. Έχω '+cleanList().length+' γραφεία. Πώς μπορώ να βοηθήσω;</div></div>';
}

loadData();
renderStats();
renderFilters();
</script>
</body>
</html>
